<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Calcular Total no Estoque</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Calcular Total no Estoque</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button routerLink="/desafio2">Voltar para o Menu</ion-button> <br> <br>
  <h2 *ngIf="total > 0">Valor total: {{ totalFormatado }}</h2>
  <h2 *ngIf="total === 0">Nenhum produto encontrado</h2>
  <ion-button (click)="calcularTotalEstoque()">Calcular Total no Estoque</ion-button>
</ion-content>
