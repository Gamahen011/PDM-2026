<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Listar Produtos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Listar Produtos</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button routerLink="/desafio2">Voltar para o Menu</ion-button> <br> <br>
  <ion-list>
    <ion-item *ngFor="let produto of produtos">
      {{ produto.nome }} - Preço: {{ preco(produto.id) }} - Quantidade: {{ produto.estoque }}
    </ion-item>
  </ion-list>
  <h2 *ngIf="valorTotalEstoque">Valor total do estoque: {{ valorTotalEstoque }}</h2>
  <ion-button (click)="TotalEstoque()">Listar Produtos</ion-button>
</ion-content>
